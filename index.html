<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mapping BAOR</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <h1>Mapping the British Army of the Rhine</h1>

  <div id="search-wrap" style="padding:10px 16px;background:#f5f7fb;border-bottom:1px solid #d9e0ec;">
    <input id="baor-search" type="text" placeholder="Search BAOR location..." style="width:280px;padding:8px 10px;font-size:14px;">
    <button id="baor-search-btn" style="padding:8px 12px;font-size:14px;">Go</button>
  </div>

 <div id="map-container">

  <div id="formation-back" class="formation-back">
    <a href="#" onclick="resetFormation(); return false;">← Return to main BAOR map</a>
  </div>

  <div id="formation-title" class="formation-title"></div>

  <div id="map"></div>

</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script src="assets/js/data/locations.js"></script>
  <script src="assets/js/map.js"></script>
</body>
</html>
