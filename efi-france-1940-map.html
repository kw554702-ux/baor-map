<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>EFI France 1940 Routes</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  height: 100%;
}

#map {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.min.js"></script>

<script>
// --- Create map ---
var map = L.map('map');

// --- Custom Union Jack icon ---
var unionJackIcon = L.icon({
  iconUrl: 'https://kw554702-ux.github.io/baor-map/assets/img/union-jack-marker.png',
  iconSize: [32, 42],
  iconAnchor: [16, 42],
  popupAnchor: [0, -36]
});

// --- Tile layer ---
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// --- Dunkirk route ---
var arras = [50.29113198460253, 2.777673705434522];
var lens = [50.4296394547227, 2.8278349635210973];
var stOmer = [50.75109195738493, 2.2428350661466654];
var bourbourg = [50.94747752843757, 2.195449194226261];
var dunkirk = [51.047143584761876, 2.381315050798782];

// --- Petit route ---
var rheims = [49.25821699761076, 4.031758579639196];
var sauvage = [48.55410344962077, 3.7601576571474866];
var bouzy = [49.079874579754616, 4.145355918472007];
var pithiviers = [48.177735528895894, 2.242384667782371];
var olivet = [47.867306865294715, 1.8990908885980011];
var montoire = [47.75504320246897, 0.8621149156059941];
var stNazaire = [47.27471411258108, -2.205862943800152];

// --- Routes ---
var dunkirkRoute = L.polyline(
  [arras, lens, stOmer, bourbourg, dunkirk],
  { color: "#073763", weight: 5 }
).addTo(map);

 L.polylineDecorator(dunkirkRoute, {
  patterns: [
    {
      offset: '55%',
      repeat: 0,
      symbol: L.Symbol.arrowHead({
        pixelSize: 16,
        polygon: false,
        pathOptions: {
          color: '#073763',
          weight: 4,
          opacity: 1
        }
      })
    }
  ]
}).addTo(map);


var petitMainRoute = L.polyline(
  [rheims, sauvage, pithiviers, olivet, montoire, stNazaire],
  { color: "#990000", weight: 4 }
).addTo(map);

  L.polylineDecorator(petitMainRoute, {
  patterns: [
    {
      offset: '20%',
      repeat: '90px',
      symbol: L.Symbol.arrowHead({
        pixelSize: 12,
        polygon: false,
        pathOptions: {
          color: '#990000',
          weight: 3,
          opacity: 0.95
        }
      })
    }
  ]
}).addTo(map);



var petitLoop = L.polyline(
  [sauvage, bouzy, rheims],
  { color: "#990000", weight: 3, dashArray: "6,6" }
).addTo(map);



// --- Markers ---
L.marker(arras, { icon: unionJackIcon }).addTo(map).bindPopup("<b>Arras</b><br>Forward BEF HQ area");
L.marker(dunkirk, { icon: unionJackIcon }).addTo(map).bindPopup("<b>Dunkirk</b><br>Evacuation point");
L.marker(rheims, { icon: unionJackIcon }).addTo(map).bindPopup("<b>Rheims</b>");
L.marker(sauvage, { icon: unionJackIcon }).addTo(map).bindPopup("<b>Sauvage</b>");
L.marker(bouzy, { icon: unionJackIcon }).addTo(map).bindPopup("<b>Bouzy</b>");
L.marker(stNazaire, { icon: unionJackIcon }).addTo(map).bindPopup("<b>St Nazaire</b>");
L.marker(stOmer, { icon: unionJackIcon }).addTo(map)
  .bindPopup("<b>St Omer</b><br>Withdrawal towards the Channel zone");
L.marker(bourbourg, { icon: unionJackIcon }).addTo(map)
  .bindPopup("<b>Bourbourg</b><br>Approach to the Dunkirk perimeter");

// --- Minimal labels ---
L.marker([51.0344, 2.3768])
  .addTo(map)
  .bindTooltip("Dunkirk<br><span style='font-size:11px;'>Channel evacuation point</span>", {
    permanent: true,
    direction: 'top',
    offset: [0, -10]
  });

L.marker([47.2735, -2.2137])
  .addTo(map)
.bindTooltip("St Nazaire<br><span style='font-size:11px;'>Atlantic evacuation point</span>", {
    permanent: true,
    direction: 'top',
    offset: [0, -10]
  });

L.marker([49.2589, 4.0310])
  .addTo(map)
  .bindTooltip("Reims<br><span style='font-size:11px;'>EFI evacuation starting point</span>", {
    permanent: true,
    direction: 'top',
    offset: [0, -10]
  });

  L.marker([50.2910, 2.7775])
  .addTo(map)
  .bindTooltip("Arras<br><span style='font-size:11px;'>EFI evacuation starting point</span>", {
    permanent: true,
    direction: 'top',
    offset: [0, -18]
  });

// --- Optional title overlay ---
var title = L.control({position: 'topright'});

title.onAdd = function () {
  var div = L.DomUtil.create('div');
  div.innerHTML = "<div style='font-family:Georgia, serif; font-size:13px; color:#073763; background:#ffffffcc; padding:6px 10px; border-radius:6px;'>EFI Retreat Routes<br>May-June 1940</div>";
  return div;
};

title.addTo(map);

// --- Fit bounds ---
var group = L.featureGroup([dunkirkRoute, petitMainRoute, petitLoop]);
map.fitBounds(group.getBounds(), {
  padding: [30, 30],
  maxZoom: 8
});
</script>

</body>
</html>
